<!-- ===== FULL SCREEN LOADER ===== -->
<div id="loader">
    <img src="{{ url_for('static', filename='uploads/FB_IMG_1774801752390.jpg') }}">
    
    <div class="overlay"></div>

    <div class="loading-text">
        Loading 
    </div>


    <!-- PROGRESS BAR -->
    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>

    
</div>

<style>
/* REMOVE DEFAULT SPACE */
html, body{
    margin:0 !important;
    padding:0 !important;
    height:100% !important;
}

/* ===== LOADER ===== */
#loader{
    position:fixed !important;
    top:0 !important;
    left:0 !important;
    width:100vw !important;
    height:100vh !important;
    z-index:999999 !important;
    overflow:hidden !important;
}



/* PROGRESS BAR */
.progress-container{
    position:absolute;
    bottom:230px;
    left:50%;
    transform:translateX(-50%);
    width:70%;
    height:6px;
    background:rgba(255,255,255,0.3);
    border-radius:10px;
    overflow:hidden;
}

.progress-bar{
    width:0%;
    height:100%;
    background:#E10092; /* theme color */
    border-radius:10px;
    transition:width 2s linear;
}

/* 🔥 IMAGE FULL SCREEN CENTER FIX */
#loader img{
    position:absolute !important;
    top:50% !important;
    left:50% !important;

    width:100vw !important;
    height:100vh !important;

    transform:translate(-50%, -50%) !important; /* ✅ CENTER FIX */

    object-fit:cover !important;
}

/* OVERLAY */
#loader .overlay{
    position:absolute !important;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

/* TEXT */
.loading-text{
    position:absolute;
    bottom:250px;   /* 👈 controls how low */
    left:50%;
    transform:translateX(-50%);
    color:#fff;
    font-size:28px;
    font-weight:700;
}
</style>


<script>
document.body.classList.add("loading");

const bar = document.querySelector(".progress-bar");
const loader = document.getElementById("loader");

/* START BAR */
setTimeout(()=>{
    bar.style.width = "100%";
}, 100);

/* FINISH */
setTimeout(()=>{
    loader.style.transform = "translateY(-100%)";
    loader.style.transition = "0.8s ease";

    document.body.classList.remove("loading"); // enable scroll

    setTimeout(()=>{
        loader.style.display = "none";
    }, 800);

}, 2100);
</script>
