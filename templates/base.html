<!DOCTYPE html>
<html lang="en">
<head>
<title>Tata Play Fiber</title>



<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tata Play Fiber Pune | Broadband, WiFi & DTH Connection</title>

<meta name="description" content="Tata Play Fiber Pune offers high-speed broadband, WiFi, and DTH connections. Fast installation in Wagholi, Kharadi, Viman Nagar, Hadapsar & all Pune areas. Best internet plans with affordable pricing.">

<meta name="robots" content="index, follow">
<meta name="author" content="Tata Play Fiber Pune">

<link rel="canonical" href="https://yourdomain.com/">

<!-- ================= LOCAL SEO ================= -->
<meta name="geo.region" content="IN-MH">
<meta name="geo.placename" content="Pune, Maharashtra">
<meta name="geo.position" content="18.5204;73.8567">
<meta name="ICBM" content="18.5204, 73.8567">

<meta name="language" content="en-IN">
<meta name="theme-color" content="#220046">

<!-- ================= OPEN GRAPH ================= -->
<meta property="og:type" content="website">
<meta property="og:title" content="Tata Play Fiber Pune - Broadband & DTH Services">
<meta property="og:description" content="Get fast broadband, WiFi & DTH connection in Pune with best offers and quick installation.">
<meta property="og:url" content="https://yourdomain.com/">
<meta property="og:image" content="{{ url_for('static', filename='uploads/Tataplay Fiber.png') }}">

<!-- ================= TWITTER ================= -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Tata Play Fiber Pune">
<meta name="twitter:description" content="Best broadband & DTH services in Pune with fast installation.">
<meta name="twitter:image" content="{{ url_for('static', filename='uploads/Tataplay Fiber.png') }}">

<!-- ================= ICON ================= -->
<link rel="icon" type="image/png" href="{{ url_for('static', filename='uploads/Tataplay Fiber.png') }}">

<!-- ================= ORGANIZATION SCHEMA ================= -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "LocalBusiness",
  "name": "Tata Play Fiber Pune",
  "image": "{{ url_for('static', filename='uploads/Tataplay Fiber.png') }}",
  "url": "https://yourdomain.com/",
  "telephone": "+919922562197",
  "address": {
    "@type": "PostalAddress",
    "addressLocality": "Pune",
    "addressRegion": "Maharashtra",
    "addressCountry": "IN"
  },
  "areaServed": "Pune",
  "priceRange": "₹₹",
  "description": "High-speed broadband, WiFi and DTH services in Pune with fast installation."
}
</script>

<!-- ================= SERVICE SCHEMA ================= -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Service",
  "serviceType": "Broadband Internet & DTH Installation",
  "provider": {
    "@type": "LocalBusiness",
    "name": "Tata Play Fiber Pune"
  },
  "areaServed": "Pune"
}
</script>

<!-- ================= FAQ SCHEMA ================= -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "How fast is Tata Play Fiber installation in Pune?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Installation is usually completed within 24–48 hours depending on area feasibility."
      }
    },
    {
      "@type": "Question",
      "name": "Which areas in Pune are covered?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "We provide service in Wagholi, Kharadi, Viman Nagar, Hadapsar, Hinjewadi, and most Pune locations."
      }
    },
    {
      "@type": "Question",
      "name": "What services are offered?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "We offer broadband internet, WiFi plans, and DTH connections with installation support."
      }
    }
  ]
}
</script>


<style>

/* ===== NAVBAR ===== */

*{
    font-family: Helvetica, sans-serif;
}
img {
    max-width: 100%;
    height: auto;
    object-fit: cover;
    display: block;
}
/* ===== NAVBAR LOGO IMAGE ===== */
.navbar-logo{
    height:65px;          /* increase/decrease size here */
    width:auto;
    object-fit:contain;
}

/* ensure navbar keeps alignment */
.navbar{
    height:70px;          /* keep fixed */
    display:flex;
    align-items:center;   /* important for perfect vertical center */
}

/* logo container alignment */
.logo{
    height: 200px;
    display:flex;
    align-items:center;
    justify-content:center;
}
.navbar{
    background:#220046;
    height:70px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
}

/* ===== LOGO WRAPPER ===== */


/* TOP LINE (TATA + PLAY) */
.line1{
    display:flex;
    gap:8px;
    align-items:center;
}


.navbar-logo{
    height:80px;   /* increase size here */
    width:auto;
    object-fit:contain;
}

.logo{
    display:flex;
    align-items:center;
    justify-content:center;
}


/* ===== BUTTONS ===== */
.navbtns{
    display:flex;
    gap:12px;
    align-items:center;
    
}

.btn{
    padding:6px 14px;
    background:#E10092;
    border:none;
    color:#fff;
    border-radius:20px;
    cursor:pointer;
    font-size:13px;
    transition:0.3s;
    white-space:nowrap;
    text-decoration:none; /* REMOVE UNDERLINE */
    font-family: Helvetica,  sans-serif;
}

.btn:hover{
    background:#ff1aa8;
}


@media (max-width: 480px){

    .navbar{
        flex-direction:row;
        height:70px;
        padding:8px 10px;
        align-items:center;
    }

    .navbar-logo{
        height:45px !important;
        width:auto;
    }

    .logo{
        flex-shrink:0;
    }

    .tata{
        font-size:11px;
    }

    .play{
        font-size:13px;
    }

    .fiber-main{
        font-size:16px;
        letter-spacing:1px;
    }

    .navbtns{
        gap:5px;
    }

    .btn{
        padding:4px 8px;
        font-size:10px;
    }
}


@media (max-width: 768px){

    .navbar{
        height:70px;
        padding:0 12px;
        align-items:center;
    }

    .navbar-logo{
        height:60px !important;
        width:auto;
    }

    .tata{
        font-size:12px;
    }

    .play{
        font-size:14px;
    }

    .fiber-main{
        font-size:20px;
        letter-spacing:2px;
    }

    .navbtns{
        gap:6px;
    }

    .btn{
        padding:5px 10px;
        font-size:11px;
    }
}

</style>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "LocalBusiness",
  "name": "Tata Play Fiber Pune",
  "image": "{{ url_for('static', filename='uploads/Tataplay Fiber.png') }}",
  "telephone": "+919922562197",
  "address": {
    "@type": "PostalAddress",
    "addressLocality": "Pune",
    "addressRegion": "Maharashtra",
    "addressCountry": "IN"
  },
  "areaServed": "Pune"
}
</script>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">

   <!-- LEFT LOGO -->
<div class="logo">

    <img src="{{ url_for('static', filename='uploads/TATAPLAYLOGO.png') }}" 
         alt="Tata Play Fiber Logo"
         style="height:45px; width:auto; object-fit:contain;">

</div>

    <!-- RIGHT BUTTONS -->
    <div class="navbtns">
        <a href="{{ url_for('home') }}" class="btn">Home</a>
        <a href="{{ url_for('services') }}" class="btn">Services</a>
        <a href="{{ url_for('contact') }}" class="btn">Contact Us</a>
    </div>

</nav>




<!-- CONTENT -->
<div class="main-content">
    {% block content %}
    {% endblock %}
</div>

</html>
