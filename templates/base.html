<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tata Play Fiber Pune | Broadband, WiFi & DTH Connection</title>

<meta name="description" content="Tata Play Fiber Pune offers high-speed broadband, WiFi, and DTH connections. Fast installation in Wagholi, Kharadi, Viman Nagar, Hadapsar & all Pune areas. Best internet plans with affordable pricing.">

<meta name="robots" content="index, follow">
<meta name="author" content="Tata Play Fiber Pune">

<link rel="canonical" href="https://yourdomain.com/">

<!-- ===== LOCAL SEO ===== -->
<meta name="geo.region" content="IN-MH">
<meta name="geo.placename" content="Pune, Maharashtra">
<meta name="geo.position" content="18.5204;73.8567">
<meta name="ICBM" content="18.5204, 73.8567">

<meta name="language" content="en-IN">
<meta name="theme-color" content="#220046">

<!-- ===== OPEN GRAPH ===== -->
<meta property="og:type" content="website">
<meta property="og:title" content="Tata Play Fiber Pune - Broadband & DTH Services">
<meta property="og:description" content="Fast broadband, WiFi & DTH connection in Pune with quick installation.">
<meta property="og:url" content="https://yourdomain.com/">
<meta property="og:image" content="{{ url_for('static', filename='uploads/Tataplay Fiber.png') }}">

<!-- ===== TWITTER ===== -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Tata Play Fiber Pune">
<meta name="twitter:description" content="Best broadband & DTH services in Pune with fast installation.">
<meta name="twitter:image" content="{{ url_for('static', filename='uploads/Tataplay Fiber.png') }}">

<!-- ===== ICON ===== -->
<link rel="icon" type="image/png" href="{{ url_for('static', filename='uploads/Tataplay Fiber.png') }}">

<!-- ===== SCHEMA: LOCAL BUSINESS ===== -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "LocalBusiness",
  "name": "Tata Play Fiber Pune",
  "image": "{{ url_for('static', filename='uploads/Tataplay Fiber.png') }}",
  "url": "https://yourdomain.com/",
  "telephone": "+919922562197",
  "address": {
    "@type": "PostalAddress",
    "addressLocality": "Pune",
    "addressRegion": "Maharashtra",
    "addressCountry": "IN"
  },
  "areaServed": "Pune",
  "priceRange": "₹₹",
  "description": "High-speed broadband, WiFi and DTH services in Pune."
}
</script>

<!-- ===== SERVICE SCHEMA ===== -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Service",
  "serviceType": "Broadband Internet & DTH Installation",
  "provider": {
    "@type": "LocalBusiness",
    "name": "Tata Play Fiber Pune"
  },
  "areaServed": "Pune"
}
</script>

<!-- ===== FAQ SCHEMA ===== -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "How fast is installation?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Installation is usually completed within 24–48 hours."
      }
    },
    {
      "@type": "Question",
      "name": "Which areas are covered?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "We cover most areas in Pune including Wagholi, Kharadi, Viman Nagar, Hadapsar, Hinjewadi."
      }
    },
    {
      "@type": "Question",
      "name": "What services are offered?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "We provide broadband internet, WiFi plans, and DTH connections."
      }
    }
  ]
}
</script>

<style>

/* ===== GLOBAL ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Helvetica, sans-serif;
}

/* ===== NAVBAR ===== */
.navbar{
    background:#220046;
    height:70px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
}

/* ===== LOGO ===== */
.logo{
    display:flex;
    align-items:center;
}

.navbar-logo{
    height:90px; /* +10px increased */
    width:auto;
    object-fit:contain;
    display:block;
}

/* ===== BUTTONS ===== */
.navbtns{
    display:flex;
    gap:12px;
    align-items:center;
}

.btn{
    padding:6px 14px;
    background:#E10092;
    color:#fff;
    border-radius:20px;
    text-decoration:none;
    font-size:13px;
    transition:0.3s;
}

.btn:hover{
    background:#ff1aa8;
}

/* ===== RESPONSIVE ===== */
@media (max-width:768px){
    .navbar-logo{
        height:55px;
    }

    .btn{
        font-size:11px;
        padding:5px 10px;
    }
}

</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">

    <div class="logo">
        <img class="navbar-logo"
             src="{{ url_for('static', filename='uploads/TATAPLAYLOGO.png') }}"
             alt="Tata Play Fiber Logo">
    </div>

    <div class="navbtns">
        <a href="{{ url_for('home') }}" class="btn">Home</a>
        <a href="{{ url_for('services') }}" class="btn">Services</a>
        <a href="{{ url_for('contact') }}" class="btn">Contact Us</a>
    </div>

</nav>

<!-- CONTENT -->
<div class="main-content">
    {% block content %}{% endblock %}
</div>

</body>
</html>
