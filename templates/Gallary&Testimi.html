<style>

body{
    margin-bottom: 0;
}

/* ===== THRILL GALLERY (BASE) ===== */
.thrill-gallery{
    background:#53109a;
    margin-bottom: 5px !important;
    padding-bottom: 10px !important;
}

/* ===== TITLES ===== */
.thrill-gallery h2{
    color:white;
    font-size:28px;
    font-weight:800;
    margin: 20px 0 10px;
    text-align:center;
    letter-spacing:0.5px;
}

/* ===== OTT STYLE TITLE ===== */
.gallery-title{
    text-align: center;
    margin-top: 0px;
    margin-bottom: -8px;
}

.gallery-title h2{
    font-family: sans-serif;
    font-weight: 600;
    font-size: 28px;
    color: #ffffff;
    letter-spacing: 0.8px;

    display: inline-block;
    padding: 6px 14px;

    background: white;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* ===== GALLERY WRAPPER ===== */
.gallery{
    padding:70px 30px;
    text-align:center;
    background:#f8f9ff;
}

.gallery h2{
    font-size:32px;
    font-weight:800;
    color:#111;
}

/* ===== GRID ===== */
.gallery-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
    gap:22px;
    max-width:1200px;
    margin:auto;
}

/* override inside thrill section */
.thrill-gallery .gallery-grid{
    max-width:1200px;
    margin: 0 auto;
    gap:18px;
}

/* ===== CARD ===== */
.gallery-item{
    position:relative;
    border-radius:18px;
    overflow:hidden;

    width:100%;
    display:inline-block;

    box-shadow:0 15px 35px rgba(0,0,0,0.12);

    border:1px solid rgba(255,255,255,0.15);
}

/* ===== IMAGE ===== */
.gallery-item img{
    width:100%;
    height:100%;
    object-fit:contain;
    object-position:center;
    display:block;

    filter:contrast(1.05) saturate(1.1);
}

/* zoom effect */
.gallery-item:hover img{
    transform:scale(1.08);
}

/* ===== OVERLAY ===== */
.gallery-item .overlay{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    padding:16px;

    background:linear-gradient(to top, rgba(0,0,0,0.85), transparent);
    color:#fff;

    font-size:15px;
    font-weight:600;

    opacity:0;
    transition:0.3s ease;
}

.gallery-item:hover .overlay{
    opacity:1;
}

/* ===== ANIMATION (SOFT) ===== */
.gallery-item{
    opacity:0;
    transform: translateY(40px) scale(0.92);
    transition: all 0.6s ease;
}

.gallery-item.show{
    animation: popIn 0.6s ease forwards;
}

/* POP ANIMATION */
@keyframes popIn{
    0%{
        transform: translateY(60px) scale(0.85);
        opacity:0;
    }
    60%{
        transform: translateY(-10px) scale(1.03);
        opacity:1;
    }
    100%{
        transform: translateY(0) scale(1);
        opacity:1;
    }
}

/* fallback animation */
@keyframes popSoft{
    0%{
        transform: translateY(40px) scale(0.92);
        opacity:0;
    }
    100%{
        transform: translateY(0) scale(1);
        opacity:1;
    }
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const elements = document.querySelectorAll(".gallery-item, .testimonial-card");

    const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry, index) => {

            if (entry.isIntersecting) {

                setTimeout(() => {
                    entry.target.classList.add("show");
                }, index * 120); // smooth stagger animation
            }

        });
    }, {
        threshold: 0.2
    });

    elements.forEach(el => observer.observe(el));
});
</script>
