<style>
/* ===== GALLERY SECTION ===== */
.thrill-gallery h2{
    text-align:center;
    font-size:28px;
    font-weight:700;
    color:#fff;
    margin: 20px 0 10px;
    letter-spacing:0.5px;

.gallery{
    padding:70px 30px;

}


.gallery h2{
    font-size:32px;
    font-weight:800;
    margin-bottom:30px;
    color:#111;
}

/* GRID */
.gallery-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
    gap:22px;
    max-width:1200px;
    margin:auto;
}

/* CARD */
.gallery-item{
    position:relative;
    border-radius:18px;
    overflow:hidden;

    box-shadow:0 15px 35px rgba(0,0,0,0.12);

    display:inline-block;   /* ✅ key fix */
    width:100%;
}

/* SHOW ANIMATION */
/* ===== IMAGE FIX (SMALL + CLEAN FIT) ===== */
/* ===== FIXED GALLERY IMAGE (NO CROP, CLEAN FIT) ===== */

.gallery-item img{
    width:100%;
    height:100%;
    object-fit:contain;   /* ✅ shows full image */
    object-position:center;
    display:block;
}
/* SMALLER NICE LOOK */

/* SOFT POP ANIMATION */
.gallery-item.show{
    animation: popSoft 0.6s ease forwards;
}

@keyframes popSoft{
    0%{
        transform: translateY(40px) scale(0.92);
        opacity:0;
    }
    100%{
        transform: translateY(0) scale(1);
        opacity:1;
    }
}

/* ZOOM EFFECT */
.gallery-item:hover img{
    transform:scale(1.08);
}

/* OVERLAY TEXT */
.gallery-item .overlay{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    padding:16px;

    background:linear-gradient(to top, rgba(0,0,0,0.85), transparent);
    color:#fff;

    font-size:15px;
    font-weight:600;

    opacity:0;
    transition:0.3s ease;
}

.gallery-item:hover .overlay{
    opacity:1;
}
/* ===== REVIEWS SECTION ===== */






/* ===== THRILL GALLERY SECTION FIX ===== */
.thrill-gallery{
    background:#53109a;
  
   
}

/* TITLE INSIDE THRILL */
.thrill-gallery h2{
    color:white;
    font-size:28px;
    font-weight:800;
    margin-bottom:30px;
}

/* KEEP SAME GRID BUT IMPROVED */
.thrill-gallery .gallery-grid{
    max-width:1200px;
}

/* CARD IMPROVEMENT */
.thrill-gallery .gallery-item{
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 20px 40px rgba(0,0,0,0.25);
}

/* IMAGE SMOOTHER LOOK */
.thrill-gallery .gallery-item img{
    filter:contrast(1.05) saturate(1.1);
}

/* POP ANIMATION STRONGER */
.gallery-item.show{
    animation: popIn 0.6s ease forwards;
}

@keyframes popIn{
    0%{
        transform: translateY(60px) scale(0.85);
        opacity:0;
    }
    60%{
        transform: translateY(-10px) scale(1.03);
        opacity:1;
    }
    100%{
        transform: translateY(0) scale(1);
        opacity:1;
    }
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const elements = document.querySelectorAll(".gallery-item, .testimonial-card");

    const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry, index) => {

            if (entry.isIntersecting) {

                setTimeout(() => {
                    entry.target.classList.add("show");
                }, index * 120); // smooth stagger animation
            }

        });
    }, {
        threshold: 0.2
    });

    elements.forEach(el => observer.observe(el));
});
</script>
